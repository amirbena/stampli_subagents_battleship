server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: battleship
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}

battleship:
  cors:
    # Strict port range for allowed localhost CORS origins (inclusive).
    # Only http://localhost:<minPort> through http://localhost:<maxPort> are permitted.
    # Override via CORS_MIN_PORT / CORS_MAX_PORT environment variables.
    min-port: ${CORS_MIN_PORT:3000}
    max-port: ${CORS_MAX_PORT:3030}
