server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: battleship
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  redis:
    host: ${SPRING_REDIS_HOST:localhost}
    port: ${SPRING_REDIS_PORT:6379}

battleship:
  cors:
    # [*] is Spring's wildcard token for any port value in allowedOriginPatterns.
    # This lets any localhost port through without enumerating ports explicitly.
    allowed-origin-pattern: ${CORS_ALLOWED_ORIGIN_PATTERN:http://localhost:[*]}
